<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elev — Dashboard Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary:    #F2E8D5;
      --bg-card:       #FFFFFF;
      --text-primary:  #4A3728;
      --text-muted:    #78716C;
      --text-secondary:#A8A29E;
      --border-card:   rgba(74,55,40,0.12);
      --bar-track:     rgba(74,55,40,0.1);
      --bar-from:      #c4a882;
      --bar-to:        #a0785c;
      --avatar-bg:     #e8dcc8;
      --accent:        #1B2E1D;
      --font-serif:    'DM Serif Display', serif;
      --font-sans:     'DM Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #0a0806;
      overflow-x: hidden;
    }

    /* ── Background page ── */
    .body-bg {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #f2e8d5 0%, #e5d8c2 30%, #d5e2d0 65%, #f2e8d5 100%);
      z-index: 0;
    }

    /* ── Layout ── */
    .layout {
      position: relative; z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding: 48px 32px 64px;
      width: 100%;
    }

    .page-header { text-align: center; }
    .page-eyebrow {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--text-muted); opacity: 0.5;
      margin-bottom: 8px;
    }
    .page-title {
      font-family: var(--font-serif);
      font-style: italic; font-size: 36px;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* ── Phone shell ── */
    .phone-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .screen-label {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(74,55,40,0.35);
    }
    .phone {
      width: 310px;
      height: 672px;
      border-radius: 46px;
      overflow: hidden;
      position: relative;
      display: flex; flex-direction: column;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.08),
        0 0 0 9px rgba(0,0,0,0.15),
        0 0 0 10px rgba(0,0,0,0.05),
        0 48px 120px rgba(0,0,0,0.3);
    }
    .phone-bg {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #f2e8d5 0%, #e5d8c2 30%, #d5e2d0 65%, #f2e8d5 100%);
      z-index: 0;
    }
    .phone-ui {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 0;
      flex-shrink: 0;
    }
    .s-time {
      font-size: 13px; font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }
    .s-icons { display: flex; gap: 5px; }
    .s-icons span {
      font-size: 11px;
      color: rgba(74,55,40,0.6);
    }

    /* ── Content area ── */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
      padding: 16px 24px 0;
      position: relative;
      overflow-y: auto;
    }

    /* ── Profile button ── */
    .profile-btn {
      position: absolute;
      top: 16px; right: 24px;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--avatar-bg);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 16px;
      color: var(--text-primary);
      border: 1px solid rgba(74,55,40,0.1);
    }

    /* ── Greeting ── */
    .greeting { text-align: left; }

    .greeting-date {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeSlideUp 500ms ease-out 100ms forwards;
    }

    .greeting-hello {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 38px;
      line-height: 1.15;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeSlideUp 500ms ease-out 200ms forwards;
    }

    .greeting-message {
      font-size: 15px;
      color: var(--text-muted);
      margin-top: 10px;
      line-height: 1.5;
      opacity: 0;
      animation: fadeSlideUp 500ms ease-out 350ms forwards;
    }

    /* ── Hero image ── */
    .hero-image {
      margin-top: 24px;
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 4/3;
      opacity: 0;
      animation: fadeSlideUp 500ms ease-out 450ms forwards;
    }
    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Calories section ── */
    .calories-card {
      margin-top: 28px;
      padding: 0;
      opacity: 0;
      animation: fadeSlideUp 500ms ease-out 450ms forwards;
    }

    .cal-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .cal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .cal-left { flex: 1; }

    .cal-numbers {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 14px;
    }

    .cal-consumed {
      font-family: var(--font-serif);
      font-size: 28px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .cal-objective {
      font-size: 13px;
      color: var(--text-muted);
    }

    .cal-bar-track {
      height: 6px;
      border-radius: 999px;
      background: var(--bar-track);
      overflow: hidden;
    }

    .cal-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #c4a882, #a0785c);
      width: 0%;
      animation: barFill 800ms ease-out 650ms forwards;
    }

    .cal-remaining {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .cal-ring-wrap {
      width: 64px; height: 64px;
      position: relative; flex-shrink: 0;
    }
    .cal-ring-svg {
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .cal-ring-bg {
      fill: none; stroke: var(--bar-track); stroke-width: 5;
    }
    .cal-ring-fill {
      fill: none; stroke-width: 5;
      stroke: url(#calRingGrad);
      stroke-linecap: round;
      stroke-dasharray: 170; stroke-dashoffset: 170;
      animation: ringFill 800ms ease-out 650ms forwards;
    }
    .cal-ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .cal-ring-pct {
      font-family: var(--font-serif);
      font-size: 14px; color: var(--text-primary);
      line-height: 1;
    }
    .cal-ring-unit {
      font-size: 7px; color: var(--text-secondary); font-weight: 600;
    }

    @keyframes ringFill { to { stroke-dashoffset: 65; } }

    /* ── Week dots ── */
    .week-dots {
      margin-top: 32px;
      opacity: 0;
      animation: fadeSlideUp 500ms ease-out 600ms forwards;
    }
    .week-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }
    .week-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .week-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .week-day-label {
      font-size: 10px; font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }
    .week-day-label.is-today {
      color: var(--text-primary);
    }
    .week-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(74,55,40,0.07);
      border: none;
    }
    .week-dot.done {
      background: linear-gradient(135deg, #c4a882, #a0785c);
      border: none;
      position: relative;
    }
    .week-dot.done::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 10px; height: 5px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: translate(-50%, -60%) rotate(-45deg);
    }
    .week-dot.today {
      border: 2px solid var(--text-primary);
      background: transparent;
    }

    /* ── Sleep stat ── */
    .sleep-stat {
      margin-top: 28px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      opacity: 0;
      animation: fadeSlideUp 500ms ease-out 750ms forwards;
    }
    .sleep-icon {
      font-size: 14px;
    }
    .sleep-value {
      font-family: var(--font-serif);
      font-size: 18px;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .sleep-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Bottom nav ── */
    .nav-wrap {
      padding: 0 0 24px;
      flex-shrink: 0;
    }
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 12px 32px;
    }
    .nav-icon {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-icon img {
      width: 22px; height: 22px;
      object-fit: contain;
      opacity: 0.5;
    }
    .nav-icon.active img {
      opacity: 1;
    }
    .nav-icon svg {
      width: 22px; height: 22px;
      stroke: var(--text-secondary);
      stroke-width: 1.5;
      fill: none;
    }
    .nav-icon.active svg {
      stroke: var(--text-primary);
      fill: var(--text-primary);
      stroke-width: 1;
    }

    /* ── Animations ── */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes barFill {
      from { width: 0%; }
      to   { width: 62%; }
    }

    .profile-btn {
      opacity: 0;
      animation: fadeSlideUp 400ms ease-out 100ms forwards;
    }
  </style>
</head>
